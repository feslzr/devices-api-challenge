services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Device@1234"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Device@1234", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Challenge.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Database__ConnectionString: "Server=db,1433;Database=ChallengeDB;User Id=sa;Password=Device@1234;TrustServerCertificate=True;"
    depends_on:
      db:
        condition: service_healthy